<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icy Cyan M Monogram - geometric folded design -->
  <defs>
    <linearGradient id="mGrad" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B8D4"/>
    </linearGradient>
  </defs>
  <!-- Left leg -->
  <path d="M80 320V80L200 200L320 80V320" stroke="url(#mGrad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Accent diamond -->
  <rect x="180" y="180" width="40" height="40" rx="4" transform="rotate(45 200 200)" fill="#00E5FF" opacity="0.6"/>
</svg>
